name: Deploy static content to Pages
on:
  push:
    branches: ["main"]
    paths:
    - index.html
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url || steps.deployment_retry_2.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages (Attempt 1)
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 5
      - name: Deploy to GitHub Pages (Attempt 2)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Wait before final retry
        if: steps.deployment_retry.outcome == 'failure'
        run: sleep 10
      - name: Deploy to GitHub Pages (Attempt 3)
        id: deployment_retry_2
        if: steps.deployment_retry.outcome == 'failure'
        uses: actions/deploy-pages@v5
